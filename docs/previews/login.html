<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录页 - 校园管理系统</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: 'PingFang SC','Microsoft YaHei',sans-serif; height:100vh; display:flex; align-items:center; justify-content:center; background:linear-gradient(135deg,#667eea 0%,#764ba2 100%); }
.card { width:420px; padding:40px; background:#fff; border-radius:12px; box-shadow:0 20px 60px rgba(0,0,0,0.3); }
.header { text-align:center; margin-bottom:32px; }
.header h1 { font-size:24px; color:#303133; margin:12px 0 4px; }
.header p { color:#909399; font-size:13px; }
.icon { font-size:48px; color:#409eff; }
input { width:100%; padding:12px 16px; margin:8px 0; border:1px solid #dcdfe6; border-radius:4px; font-size:14px; }
input:focus { outline:none; border-color:#409eff; }
button { width:100%; padding:12px; background:#409eff; color:#fff; border:none; border-radius:4px; font-size:16px; cursor:pointer; margin-top:16px; }
button:hover { background:#66b1ff; }
.divider { display:flex; align-items:center; color:#909399; font-size:12px; margin:20px 0 12px; }
.divider::before,.divider::after { content:''; flex:1; height:1px; background:#dcdfe6; }
.divider span { margin:0 12px; }
.tags { display:flex; gap:8px; justify-content:center; flex-wrap:wrap; }
.tag { padding:4px 12px; border-radius:4px; font-size:12px; cursor:pointer; }
.tag.admin { background:#fef0f0; color:#f56c6c; border:1px solid #fbc4c4; }
.tag.teacher { background:#f0f9eb; color:#67c23a; border:1px solid #c2e7b0; }
.tag.student { background:#fdf6ec; color:#e6a23c; border:1px solid #f5dab1; }
</style>
</head>
<body>
<div class="card">
  <div class="header">
    <div class="icon">🏫</div>
    <h1>校园管理系统</h1>
    <p>Campus Management System</p>
  </div>
  <input type="text" placeholder="用户名" value="admin">
  <input type="password" placeholder="密码" value="admin123">
  <button>登 录</button>
  <div class="divider"><span>测试账号</span></div>
  <div class="tags">
    <span class="tag admin">管理员: admin</span>
    <span class="tag teacher">教师: teacher_wang</span>
    <span class="tag student">学生: student_zhang</span>
  </div>
</div>
</body>
</html>
